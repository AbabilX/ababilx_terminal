name: Release

# Push a version tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`) to build
# the app on every platform and publish the bundles as a GitHub Release.
on:
  push:
    tags:
      - "v*"

# tauri-action needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon (arm64)
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel (x86_64)
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Linux-only system deps for the WebKitGTK webview + AppImage tooling.
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # Both macOS arches so either --target build resolves.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      # Cache the Rust build across runs; keyed per-platform.
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AbabilX Terminal ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install AbabilX Terminal for your platform."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
